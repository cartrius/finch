name: Update Latest Version
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to set as latest'
        required: true
        default: 'v0.0.1'
        type: string

jobs:
  update-latest-version:
    name: Update latest version in S3
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@b47578312673ae6fa5b5096b330d9fbac3d116df # v4.2.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2
          
      - name: Update latest version in S3
        run: |
          # Create latest.json with the version information
          cat > latest.json << EOF
          {
            "latest_version": "${{ github.event.inputs.version }}"
          }
          EOF
          
          # Upload to S3
          aws s3 cp latest.json s3://my-finch-test-bucket/latest.json --content-type "application/json" --acl public-read
          
          echo "Latest version updated to ${{ github.event.inputs.version }}"
          echo "View at https://my-finch-test-bucket.s3.amazonaws.com/latest.json"
