name: Upload OS To S3

on:
  workflow_run:
    workflows: ["Sync Submodules and Dependencies"]
    types:
      - completed
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  verify-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive
          
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.REGION }}
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT }}:role/${{ secrets.AWS_ROLE }}
          role-session-name: update-lastest-os-artifacts-in-s3
          
      - name: Update latest artifact information in S3
        run: |
          # Update the verified OS artifact information in S3
          echo "Updating the verified OS artifact information to S3..."
          # Extract artifact information from full-os.conf
          source deps/finch-core/deps/full-os.conf
          
          # Create manifest update
          MANIFEST_FILE="manifest.json"
          echo '{
            "latest": {
              "aarch64": "'$AARCH64_ARTIFACT'",
              "x86_64": "'$X86_64_ARTIFACT'"
            },
            "artifacts": [
              {
                "filename": "'$AARCH64_ARTIFACT'",
                "sha512sum": "'$AARCH64_512_DIGEST'"
              },
              {
                "filename": "'$X86_64_ARTIFACT'",
                "sha512sum": "'$X86_64_512_DIGEST'"
              }
            ]
          }' > $MANIFEST_FILE
          
          # Upload to S3
          aws s3 cp $MANIFEST_FILE s3://${{ secrets.DEPENDENCY_BUCKET_NAME }}/manifest/manifest.json --content-type "application/json"
